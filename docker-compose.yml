services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-myizam}
      POSTGRES_USER: ${POSTGRES_USER:-myizam}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-myizam}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myizam}"]
      interval: 5s
      timeout: 3s
      retries: 10

  ml:
    build: ./ml
    ports:
      - "8000:8000"
    environment:
      GUARD_MODELS: ${GUARD_MODELS:-kg}
      GUARD_MODEL_PATH_KG: /models/ragguard-kyrgyz-v1
      GUARD_MODEL_PATH_EN: /models/ragguard-v1
    volumes:
      - hf_cache:/hf-cache
      # Веса RagGuard: путь к локальной папке моделей задаётся в .env (RAGGUARD_MODELS_DIR)
      - ${RAGGUARD_MODELS_DIR:-./ml/models}:/models:ro
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10

  # api: Dockerfile для Myizam.Api добавится в фазе 6 (деплой);
  # локальная разработка — dotnet run + ng serve с прокси

  web:
    build: ./frontend/myizam-web
    ports:
      - "8080:80"
    profiles: ["full"]   # docker compose --profile full up — вместе с api

volumes:
  db_data:
  hf_cache:
