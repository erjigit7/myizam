name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  dotnet:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - run: dotnet build Myizam.sln
      - run: dotnet test Myizam.sln --no-build

  python-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install torch --index-url https://download.pytorch.org/whl/cpu
        working-directory: ml
      - run: pip install -r requirements.txt
        working-directory: ml
      - run: python -m pytest -m "not slow" -q
        working-directory: ml

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
        working-directory: frontend/myizam-web
      - run: npx ng build
        working-directory: frontend/myizam-web

  docker:
    runs-on: ubuntu-latest
    needs: [dotnet, python-ml, frontend]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f src/Myizam.Api/Dockerfile .
      - run: docker build ml
      - run: docker build frontend/myizam-web
